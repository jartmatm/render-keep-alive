name: Keep Render App Awake

on:
  schedule:
    # Se ejecuta cada 12 minutos (Render se duerme a los 15 min)
    - cron: '*/12 * * * *'
  workflow_dispatch: # Te permite ejecutarlo manualmente desde GitHub si quieres

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping a la App de InvestUp
        # Reemplaza la URL por el enlace real de tu app en Render
        run: curl -s https://investup.onrender.com > /dev/null
